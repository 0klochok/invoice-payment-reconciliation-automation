name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Check top-level CLI help
        run: uv run reconcile --help

      - name: Check report CLI help
        run: uv run reconcile report --help

      - name: Run CSV demo
        run: uv run reconcile report --invoices sample-data/demo-mixed-invoices.csv --payments sample-data/demo-mixed-payments.csv --out-dir reports/ci-csv

      - name: Run XLSX demo
        run: uv run reconcile report --invoices sample-data/demo-mixed-invoices.xlsx --payments sample-data/demo-mixed-payments.xlsx --out-dir reports/ci-xlsx
